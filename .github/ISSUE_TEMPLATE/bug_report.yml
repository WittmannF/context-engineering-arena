name: Bug report
description: Report a problem with validation, data scripts, or the site
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: what
    attributes: { label: What happened? }
    validations: { required: true }
  - type: textarea
    id: reproduce
    attributes: { label: How to reproduce }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
