id: task-002-sec-risk-radar
title: SEC Risk Radar
short_description: 'Given SEC EDGAR submissions and filings, build an evidence-backed page for synthesis.'
long_description: 'This task tests context engineering strategies on SEC EDGAR submissions and filings with evidence citation, temporal reasoning, and uncertainty handling.'
benchmark_question: 'How did the company’s disclosed risks, strategic concerns, and business narrative change over time, and which changes would a careful analyst notice?'
domain: 'finance'
difficulty: 'medium-hard'
corpus_size: 'years of filings'
tags: ["SEC", "risk", "filings", "semantic diff"]
dataset:
  name: 'SEC EDGAR submissions and filings'
  source_url: 'https://www.sec.gov/edgar/sec-api-documentation'
  license: See data_manifest.yaml
  access_method: scripted download with sample mode
outputs:
  required_sections: ["Executive Summary", "Company and Filing Scope", "Timeline of Filings", "Risk Factor Evolution", "Language Drift", "Newly Introduced Risks", "Softened or Removed Risks", "Evidence-backed Claims", "Analyst Notes and Open Questions", "Context Engineering Strategy"]
  required_visualizations: [timeline, claim_evidence_table, context_xray]
  required_claim_types: [fact, interpretation, recommendation, uncertainty]
scoring:
  dimensions: [answer_quality, evidence_quality, context_efficiency, uncertainty_handling, visual_clarity, reproducibility]
  automatic_metrics: [schema_validity, evidence_reference_integrity]
  human_metrics: [usefulness, clarity, hallucination_risk]
safety:
  privacy_risks: personal or sensitive text may appear in source data
  legal_risks: avoid unsupported accusations and license violations
  recommended_mitigations: cite evidence, show limitations, sample responsibly
